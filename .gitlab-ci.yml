spec:
  inputs:
    track:
      type: boolean
      default: false

---

include:
  - project: sysadmin/ci-utilities
    file:
      - /gitlab-templates/reuse-lint.yml
      - /gitlab-templates/blocks/workflow.yml

variables:
  KDECI_BUILD: "TRUE"
  KDECI_BST_TRACK: false

track:
  stage: build
  tags:
    - amd64
  rules:
    - if: $[[ inputs.track ]] == false
      when: never
    - !reference [.default_rules, rules]
  image: storage.kde.org/vm-images/kde-linux-builder
  script:
    - ./bootstrap.sh
    - ./track.sh

build:
  stage: build
  tags:
    - LargeVM
    - amd64
  rules:
    - if: $[[ inputs.track ]] == true
      when: never
    - !reference [.default_rules, rules]
  image: storage.kde.org/vm-images/kde-linux-builder
  script:
    - ./bootstrap.sh
    - ./build.sh
  artifacts:
    untracked: false
    when: always
    access: all
    paths:
      - ${CI_PROJECT_DIR}/artifacts/
